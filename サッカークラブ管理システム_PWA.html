function getFY(){const n=new Date();return(n.getMonth()+1)>=4?n.getFullYear():n.getFullYear()-1;}
function calcGrade(bg,by){const d=getFY()-by,i=GRADE_ORDER.indexOf(bg);if(i<0)return bg;const n=i+d;return n<0?bg:n>=GRADE_ORDER.length?"卒業":GRADE_ORDER[n];}
function enrich(m){const g=calcGrade(m.baseGrade,m.baseYear);return{...m,grade:g,clubClass:GRADE_TO_CLASS[g]||null};}
function calcFee(m,all){const e=enrich(m);if(e.grade==="卒業"||!e.active)return 0;const sib=all.some(x=>x.id!==m.id&&x.active&&x.siblingGroup&&m.siblingGroup&&x.siblingGroup===m.siblingGroup);if(e.clubClass==="U-6"){const freq=m.u6Frequency||1,base=U6F.find(o=>o.v===freq)?.f||2000;return(sib&&freq===3)?SIB_FEE:base;}return sib?SIB_FEE:BASE_FEE;}

function calcOtsuTax(monthlyPay){
  if(monthlyPay<=0)return 0;
  if(monthlyPay<88000)return Math.floor(monthlyPay*0.03063);
  for(const[limit,tax]of OTSU_TAX_TABLE){
    if(monthlyPay<limit)return tax;
  }
  // 302,000円以上: 概算 monthlyPay * 6.53% (乙欄上位帯の概算)
  return Math.floor(monthlyPay*0.0653);
}

const FB_DOC = "club-data";

function sGet(k){
  try{
    const v=localStorage.getItem(k);
    return v?JSON.parse(v):null;
  }catch(e){
    console.warn("storage.get failed for",k,e);
    return null;
  }
}
function sSet(k,v){
  try{
    localStorage.setItem(k,JSON.stringify(v));
  }catch(e){
    console.error("storage.set failed for",k,e);
  }
  // Firebaseにも保存
  fbSet(k,v);
}

let _fbSaveTimer = {};
function fbSet(k, v) {
  clearTimeout(_fbSaveTimer[k]);
  _fbSaveTimer[k] = setTimeout(async () => {
    try {
      if(!window._db) return;
      const docRef = window._fsDoc(window._db, "soccer-club", FB_DOC);
      const snap = await window._fsGetDoc(docRef);
      const current = snap.exists() ? snap.data() : {};
      current[k] = v;
      await window._fsSetDoc(docRef, current);
    } catch(e) {
      console.warn("Firebase save failed:", e);
    }
  }, 1000);
}

async function fbLoad() {
  try {
    if(!window._db) return false;
    const docRef = window._fsDoc(window._db, "soccer-club", FB_DOC);
    const snap = await window._fsGetDoc(docRef);
    if(snap.exists()) {
      const d = snap.data();
      Object.keys(d).forEach(k => {
        localStorage.setItem(k, JSON.stringify(d[k]));
      });
      return true;
    }
  } catch(e) {
    console.warn("Firebase load failed:", e);
  }
  return false;
}
window._fbLoad = fbLoad;

function FF({l,v,c,p,t,r}){return(<div style={{flex:1,minWidth:140}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:4}}>{l} {r&&<span style={{color:"#e53935"}}>*</span>}</label><input type={t||"text"} value={v} onChange={e=>c(e.target.value)} placeholder={p} style={S.input}/></div>);}

// ===== Calendar Helpers =====
function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}
function getFirstDayOfWeek(year, month) {
  return new Date(year, month - 1, 1).getDay();
}

function PayrollTab({feeYr,setFeeYr,coaches,events,venues,payrollCoachId,setPayrollCoachId,S}){
  const prYear=feeYr;
  const prCoach=coaches.find(c=>c.id===payrollCoachId)||coaches[0]||null;
  if(!prCoach)return null;

  const getEvtsForCoachMonth=(coachId,year,month)=>{
    return events.filter(ev=>{
      const d=new Date(ev.date);
      const eMonth=d.getMonth()+1;
      const eYear=d.getFullYear();
      const fmYear=month>=4?year:year+1;
      return eMonth===month&&eYear===fmYear&&ev.coachIds.includes(coachId);
    }).sort((a,b)=>a.date.localeCompare(b.date));
  };
  const calcMonthPay=(coach,year,month)=>{
    if(coach.payType==="volunteer")return 0;
    if(coach.payType==="monthly")return coach.monthlyPay||0;
    return getEvtsForCoachMonth(coach.id,year,month).length*(coach.payRate||DEFAULT_PER_RATE);
  };
  const yearTotal=MOS.reduce((s,mo)=>s+calcMonthPay(prCoach,prYear,mo),0);
  const yearDays=MOS.reduce((s,mo)=>s+getEvtsForCoachMonth(prCoach.id,prYear,mo).length,0);
  const yearTax=MOS.reduce((s,mo)=>s+calcOtsuTax(calcMonthPay(prCoach,prYear,mo)),0);

        <div><div style={{fontSize:11,color:"#888"}}>年間謝礼金（コーチ手取り）</div><div style={{fontSize:16,fontWeight:800,color:"#2E7D32"}}>¥{yearTotal.toLocaleString()}</div></div>
        <div><div style={{fontSize:11,color:"#888"}}>賃金計算期間</div><div style={{fontSize:14}}>{prYear}年4月〜{prYear+1}年3月</div></div>
        <div><div style={{fontSize:11,color:"#888"}}>源泉所得税（乙欄・クラブ負担）</div><div style={{fontSize:16,fontWeight:800,color:"#C62828"}}>¥{yearTax.toLocaleString()}</div></div>

                })}
                <tr style={{background:"#fafafa"}}><td colSpan={6} style={{...S.td,padding:"6px 10px",fontWeight:700}}>月合計（{evts.length}日）</td><td style={{...S.td,padding:"6px 10px",textAlign:"right",fontWeight:800,color:"#2E7D32"}}>¥{monthPay.toLocaleString()}</td></tr>
              </tbody>
            </table>
          ):(<div style={{padding:"12px 16px",color:"#aaa",fontSize:12}}>この月の出勤はありません</div>)}

      );
    })}
    <div style={{...S.tWrap,marginTop:8}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr><th style={S.th}></th>{ML.map((l,i)=><th key={i} style={{...S.th,textAlign:"center",minWidth:55}}>{l}</th>)}<th style={{...S.th,textAlign:"center",background:"#f0f0f0"}}>年間</th></tr></thead>
        <tbody>
          <tr><td style={{...S.td,fontWeight:700,fontSize:12}}>出勤日数</td>{MOS.map((mo,i)=><td key={i} style={{...S.td,textAlign:"center"}}>{getEvtsForCoachMonth(prCoach.id,prYear,mo).length}日</td>)}<td style={{...S.td,textAlign:"center",background:"#fafafa",fontWeight:800}}>{yearDays}日</td></tr>
          <tr><td style={{...S.td,fontWeight:700,fontSize:12,color:"#2E7D32"}}>謝礼金（コーチ手取り）</td>{MOS.map((mo,i)=>{const p=calcMonthPay(prCoach,prYear,mo);return<td key={i} style={{...S.td,textAlign:"center",fontWeight:600,color:p>0?"#2E7D32":"#ccc"}}>¥{p.toLocaleString()}</td>;})}<td style={{...S.td,textAlign:"center",background:"#fafafa",fontWeight:900,color:"#2E7D32",fontSize:15}}>¥{yearTotal.toLocaleString()}</td></tr>
          <tr><td style={{...S.td,fontWeight:700,fontSize:12,color:"#C62828"}}>源泉所得税（乙欄・クラブ負担）</td>{MOS.map((mo,i)=>{const p=calcMonthPay(prCoach,prYear,mo);const t=calcOtsuTax(p);return<td key={i} style={{...S.td,textAlign:"center",fontWeight:600,color:t>0?"#C62828":"#ccc"}}>¥{t.toLocaleString()}</td>;})}<td style={{...S.td,textAlign:"center",background:"#fafafa",fontWeight:900,color:"#C62828",fontSize:15}}>¥{yearTax.toLocaleString()}</td></tr>
          <tr style={{background:"#FFF3E0"}}><td style={{...S.td,fontWeight:800,fontSize:12,color:"#E65100"}}>クラブ総支出（謝礼＋税）</td>{MOS.map((mo,i)=>{const p=calcMonthPay(prCoach,prYear,mo);const t=calcOtsuTax(p);const total=p+t;return<td key={i} style={{...S.td,textAlign:"center",fontWeight:700,color:total>0?"#E65100":"#ccc"}}>¥{total.toLocaleString()}</td>;})}<td style={{...S.td,textAlign:"center",background:"#FFE0B2",fontWeight:900,color:"#E65100",fontSize:15}}>¥{(yearTotal+yearTax).toLocaleString()}</td></tr>
        </tbody>

}


function App() {

  const [feeSub, setFeeSub] = useState("monthly");

  // Schedule state
  const [schView, setSchView] = useState("calendar");
  const [schYear, setSchYear] = useState(new Date().getFullYear());
  const [schMonth, setSchMonth] = useState(new Date().getMonth() + 1);
  const [schCls, setSchCls] = useState("all");
  const [evtForm, setEvtForm] = useState(null);
  const [evtEditId, setEvtEditId] = useState(null);
  const [selEvt, setSelEvt] = useState(null);
  const [coachForm, setCoachForm] = useState(null);
  const [venueForm, setVenueForm] = useState(null);
  const [payMonth, setPayMonth] = useState(null);
  const [backupData, setBackupData] = useState(null);
  const [showRestore, setShowRestore] = useState(false);
  const [restoreText, setRestoreText] = useState("");
  const [dupEvtData, setDupEvtData] = useState(null);
  const [dupDates, setDupDates] = useState([]);
  const [dupCalYear, setDupCalYear] = useState(new Date().getFullYear());
  const [dupCalMonth, setDupCalMonth] = useState(new Date().getMonth()+1);
  const [payrollCoachId, setPayrollCoachId] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        // Firebaseからデータをロード（失敗してもアプリは動く）
        try {
          await Promise.race([
            (async () => {
              if(!window._firebaseReady) {
                await new Promise(resolve => {
                  window.addEventListener('firebaseReady', resolve, {once:true});
                });
              }
              if(window._fbLoad) await window._fbLoad();
            })(),
            new Promise(resolve => setTimeout(resolve, 2000)) // 2秒でタイムアウト
          ]);
        } catch(e) { console.warn('Firebase load skipped:', e); }
        const m = sGet(SK.m);
        const p = sGet(SK.p);
        const e = sGet(SK.e);
        const ev = sGet(SK.ev);
        const co = sGet(SK.co);
        const vn = sGet(SK.vn);
        setMembers(Array.isArray(m) && m.length > 0 ? m : SAMPLE);
        setPayments(p && typeof p === "object" ? p : {});
        setExtras(e && typeof e === "object" ? e : {});
        setEvents(Array.isArray(ev) ? ev : []);
        setCoaches(Array.isArray(co) && co.length > 0 ? co : SAMPLE_COACHES);
        setVenues(Array.isArray(vn) && vn.length > 0 ? vn : DEFAULT_VENUES);
      } catch (err) {
        console.error("Failed to load data:", err);
        setMembers(SAMPLE);
        setPayments({});
        setExtras({});
        setEvents([]);
        setCoaches(SAMPLE_COACHES);
        setVenues(DEFAULT_VENUES);
      }
      setLoaded(true);
    })();
  }, []);
  useEffect(()=>{if(loaded)sSet(SK.m,members);},[members,loaded]);
  useEffect(()=>{if(loaded)sSet(SK.p,payments);},[payments,loaded]);
  useEffect(()=>{if(loaded)sSet(SK.e,extras);},[extras,loaded]);
  useEffect(()=>{if(loaded)sSet(SK.ev,events);},[events,loaded]);

  const gp=(mid,yr,mo)=>payments[pk(mid,yr,mo)]||null;
  const tp=(mid,yr,mo)=>{const k=pk(mid,yr,mo);setPayments(p=>{const n={...p};if(n[k])delete n[k];else n[k]={paidDate:new Date().toISOString().split("T")[0],amount:calcFee(members.find(m=>m.id===mid),members)};return n;});};
  const exKey=(mid,yr,fk)=>`${mid}-${yr}-${fk}`;
  const getEx=(mid,yr,fk)=>extras[exKey(mid,yr,fk)]||null;
  const setExV=(mid,yr,fk,data)=>setExtras(p=>({...p,[exKey(mid,yr,fk)]:data}));
  const delEx=(mid,yr,fk)=>setExtras(p=>{const n={...p};delete n[exKey(mid,yr,fk)];return n;});
  const togExPaid=(mid,yr,fk)=>{const ex=getEx(mid,yr,fk);if(ex)setExV(mid,yr,fk,{...ex,paid:!ex.paid,paidDate:!ex.paid?new Date().toISOString().split("T")[0]:""});};
  const ccnt={};CLASSES.forEach(c=>{ccnt[c]=em.filter(m=>m.clubClass===c&&m.active&&m.grade!=="卒業").length;});

  const tExp=feeMems.reduce((s,m)=>s+calcFee(members.find(r=>r.id===m.id),members)*12,0);

  let feeRows=feeMems;if(feeSt==="unpaid")feeRows=feeRows.filter(m=>MOS.some(mo=>!gp(m.id,feeYr,mo)));if(feeSt==="paid")feeRows=feeRows.filter(m=>MOS.every(mo=>gp(m.id,feeYr,mo)));

  const daysInMonth = getDaysInMonth(schYear, schMonth);

  const calWeeks = [];

              <div style={S.fCard}><div style={{fontSize:12,color:"#888"}}>年間見込</div><div style={{fontSize:20,fontWeight:800,color:"#2E7D32",marginTop:4}}>¥{tExp.toLocaleString()}</div></div>
              <div style={S.fCard}><div style={{fontSize:12,color:"#888"}}>入金済</div><div style={{fontSize:20,fontWeight:800,color:"#0D47A1",marginTop:4}}>¥{tPd.toLocaleString()}</div></div>
              <div style={S.fCard}><div style={{fontSize:12,color:"#888"}}>未納額</div><div style={{fontSize:20,fontWeight:800,color:tExp-tPd>0?"#C62828":"#2E7D32",marginTop:4}}>¥{(tExp-tPd).toLocaleString()}</div></div>
            </div>
            <div style={S.toolbar}><div style={S.tLeft}><select value={feeCls} onChange={e=>setFeeCls(e.target.value)} style={S.sel}><option value="all">全クラス</option>{CLASSES.map(c=><option key={c} value={c}>{c}</option>)}</select><select value={feeSt} onChange={e=>setFeeSt(e.target.value)} style={S.sel}><option value="all">全員</option><option value="unpaid">未納あり</option><option value="paid">完納</option></select></div></div>
            <div style={S.tWrap}><table style={{...S.table,minWidth:900}}><thead><tr><th style={{...S.th,position:"sticky",left:0,zIndex:2,background:"#fafafa"}}>名前</th><th style={S.th}>クラス</th><th style={S.th}>月額</th>{ML.map((l,i)=><th key={i} style={{...S.th,textAlign:"center",minWidth:48}}>{l}</th>)}</tr></thead><tbody>{feeRows.length===0?<tr><td colSpan={15} style={S.empty}>該当なし</td></tr>:feeRows.map(renderFeeRow)}</tbody></table></div>

          </>)}

        {/* ============ SCHEDULE ============ */}
        {tab==="schedule"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>

              <div style={{display:"flex",gap:4}}>{[["calendar","📅 カレンダー"],["list","📋 リスト"]].map(([k,l])=>(<button key={k} onClick={()=>setSchView(k)} style={{...S.subTab,...(schView===k?S.subTabAct:{})}}>{l}</button>))}</div>
              <button onClick={()=>{setEvtForm({...EMPTY_EVT,date:`${schYear}-${String(schMonth).padStart(2,"0")}-${String(new Date().getDate()).padStart(2,"0")}`});setEvtEditId(null);}} style={S.addBtn}>＋ 予定を追加</button>
            </div>
          </div>

          {/* Event type legend */}
          <div style={{display:"flex",gap:12,marginBottom:12,flexWrap:"wrap"}}>
            {EVT_TYPES.map(t=>(<div key={t.key} style={{display:"flex",alignItems:"center",gap:4,fontSize:12}}><span style={{display:"inline-block",width:12,height:12,borderRadius:3,background:t.bg,border:`1px solid ${t.color}`}}></span><span style={{color:t.color,fontWeight:600}}>{t.label}</span></div>))}
            <div style={{marginLeft:"auto",display:"flex",gap:6}}><button onClick={()=>setVenueForm("")} style={{...S.subTab,fontSize:12,padding:"4px 12px"}}>📍 場所管理</button><button onClick={()=>setCoachForm("")} style={{...S.subTab,fontSize:12,padding:"4px 12px"}}>👨‍🏫 コーチ管理</button></div>
          </div>

          {/* Calendar view */}
          {schView==="calendar"&&(
            <div style={S.tWrap}>
              <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
                <thead><tr>{["日","月","火","水","木","金","土"].map((d,i)=>(<th key={i} style={{...S.th,textAlign:"center",color:i===0?"#C62828":i===6?"#0D47A1":"#666"}}>{d}</th>))}</tr></thead>
                <tbody>
                  {calWeeks.map((week,wi)=>(
                    <tr key={wi}>
                      {week.map((day,di)=>{
                        const isToday=day&&schYear===new Date().getFullYear()&&schMonth===new Date().getMonth()+1&&day===new Date().getDate();
                        const dayEvents=day?evtForDay(day):[];
                        return (
                          <td key={di} style={{...S.td,verticalAlign:"top",height:90,padding:4,background:isToday?"#F1F8E9":"white",cursor:day?"pointer":"default",color:di===0?"#C62828":di===6?"#0D47A1":"#333"}}
                            onClick={()=>{if(day){setEvtForm({...EMPTY_EVT,date:`${schYear}-${String(schMonth).padStart(2,"0")}-${String(day).padStart(2,"0")}`});setEvtEditId(null);}}}>
                            {day&&(<><div style={{fontSize:13,fontWeight:isToday?800:600,marginBottom:2}}>{day}</div>{dayEvents.slice(0,3).map(renderEvtBadge)}{dayEvents.length>3&&<div style={{fontSize:10,color:"#888"}}>+{dayEvents.length-3}件</div>}</>)}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* List view */}
          {schView==="list"&&(
            <div style={S.tWrap}>
              <table style={S.table}><thead><tr><th style={S.th}>日付</th><th style={S.th}>種別</th><th style={S.th}>時間</th><th style={S.th}>場所</th><th style={S.th}>対象クラス</th><th style={S.th}>コーチ</th><th style={S.th}>メモ</th><th style={{...S.th,textAlign:"center"}}>操作</th></tr></thead>
              <tbody>
                {evtForMonth.sort((a,b)=>a.date.localeCompare(b.date)||a.startTime.localeCompare(b.startTime)).length===0
                  ?<tr><td colSpan={8} style={S.empty}>この月の予定はありません</td></tr>
                  :evtForMonth.sort((a,b)=>a.date.localeCompare(b.date)||a.startTime.localeCompare(b.startTime)).map(ev=>{
                    const t=EVT_TYPES.find(x=>x.key===ev.type);
                    const vn=getVenueName(ev);
                    return(
                      <tr key={ev.id} style={S.tr} onClick={()=>setSelEvt(ev)}>
                        <td style={S.td}>{new Date(ev.date).getDate()}日（{["日","月","火","水","木","金","土"][new Date(ev.date).getDay()]}）</td>
                        <td style={S.td}><span style={{padding:"3px 10px",borderRadius:12,fontSize:12,fontWeight:700,background:t?.bg,color:t?.color}}>{t?.label}</span></td>
                        <td style={S.td}>{ev.startTime}{ev.endTime?`〜${ev.endTime}`:""}</td>
                        <td style={S.td}>{vn}{ev.opponent&&<div style={{fontSize:11,color:"#888"}}>vs {ev.opponent}</div>}</td>
                        <td style={S.td}>{ev.classes.map(c=><span key={c} style={{...S.cBdgSm,backgroundColor:CC[c]?.bg,color:CC[c]?.t}}>{c}</span>)}</td>
                        <td style={S.td}>{ev.coachIds.map(cid=>{const co=coaches.find(x=>x.id===cid);return co?<span key={cid} style={S.coachBdg}>{co.name}</span>:null;})}</td>
                        <td style={{...S.td,fontSize:12,color:"#666",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.memo}</td>
                        <td style={{...S.td,textAlign:"center"}}>
                          <button onClick={e=>{e.stopPropagation();setEvtForm({...ev});setEvtEditId(ev.id);}} style={S.iBtn}>✏️</button>
                          <button onClick={e=>{e.stopPropagation();dupEvt(ev);}} style={S.iBtn} title="複製">📋</button>

          <div style={{marginTop:12,display:"flex",gap:12,flexWrap:"wrap"}}>
            {EVT_TYPES.map(t=>{const cnt=evtForMonth.filter(ev=>ev.type===t.key).length;return(<div key={t.key} style={{...S.fCard,padding:"10px 14px"}}><span style={{fontSize:12,color:t.color,fontWeight:700}}>{t.label}</span><span style={{fontSize:18,fontWeight:800,marginLeft:8}}>{cnt}</span><span style={{fontSize:11,color:"#888"}}>件</span></div>);})}
          </div>
        </>)}

        {/* ============ COACH PAY ============ */}
        {tab==="coachPay"&&(()=>{
          const cpYear = feeYr;
          const updateCoachPay=(id,field,val)=>setCoaches(p=>p.map(c=>c.id===id?{...c,[field]:val}:c));

          const getCoachMonthCount=(coachId,year,month)=>{
            return events.filter(ev=>{
              const d=new Date(ev.date);
              const eMonth=d.getMonth()+1;
              const eYear=d.getFullYear();
              const fmYear = month >= 4 ? year : year + 1;
              return eMonth===month && eYear===fmYear && ev.coachIds.includes(coachId);
            }).length;
          };
          const calcCoachMonthPay=(coach,year,month)=>{
            if(coach.payType==="volunteer") return 0;
            if(coach.payType==="monthly") return coach.monthlyPay||0;
            return getCoachMonthCount(coach.id,year,month) * (coach.payRate||DEFAULT_PER_RATE);
          };

          // Monthly income = sum of each active member's fee (見込み)
          const activeMs = em.filter(m => m.active && m.grade !== "卒業");
          const calcMonthIncome = () => activeMs.reduce((s,m) => s + calcFee(members.find(r=>r.id===m.id), members), 0);
          const monthlyIncome = calcMonthIncome();

          const monthTotals = MOS.map(mo => coaches.reduce((s,co) => s + calcCoachMonthPay(co,cpYear,mo), 0));
          const monthIncomes = MOS.map(() => monthlyIncome);
          const monthProfits = MOS.map((mo,i) => monthIncomes[i] - monthTotals[i]);
          const totalExpense = monthTotals.reduce((s,v) => s+v, 0);
          const yearIncome = monthlyIncome * 12;
          const yearProfit = yearIncome - totalExpense;

          // Selected month data
          const selMo = payMonth;
          const selMoIdx = selMo ? MOS.indexOf(selMo) : -1;
          const selMoIncome = selMo ? monthIncomes[selMoIdx] : yearIncome;
          const selMoExpense = selMo ? monthTotals[selMoIdx] : totalExpense;

        {/* Member Detail Modal */}
        {selMem&&!showForm&&(<div style={S.ov} onClick={()=>setSelMem(null)}><div style={S.modal} onClick={e=>e.stopPropagation()}>
          <div style={S.mHead}><h2 style={{margin:0,fontSize:20}}>{selMem.number&&<span style={{...S.nBdg,marginRight:8}}>{selMem.number}</span>}{selMem.lastName} {selMem.firstName}<span style={{fontSize:13,fontWeight:400,color:"#888",marginLeft:8}}>{selMem.lastNameKana} {selMem.firstNameKana}</span></h2><button onClick={()=>setSelMem(null)} style={S.clsBtn}>✕</button></div>
          <div style={S.mBody}><div style={S.dGrid}><DI l="現在の学年" v={selMem.grade}/><DI l="クラス" v={<CB c={selMem.clubClass}/>}/><DI l="登録時学年" v={`${selMem.baseGrade}（${selMem.baseYear}年度）`}/><DI l="学校" v={selMem.school}/><DI l="住所" v={selMem.address}/><DI l="入会日" v={selMem.joinDate}/><DI l="退会日" v={selMem.leaveDate||"—"}/>{selMem.clubClass==="U-6"&&<DI l="週回数" v={`週${selMem.u6Frequency||1}`}/>}<DI l="兄弟" v={selMem.siblingGroup||"なし"}/><DI l="月謝" v={`¥${calcFee(members.find(m=>m.id===selMem.id),members).toLocaleString()}`}/></div>
            {[["保護者①","parent1"],["保護者②","parent2"]].map(([t,p])=>(<div key={p} style={S.pSec}><h3 style={S.pTitle}>{t}</h3><div style={S.dGrid}><DI l="氏名" v={selMem[p+"Name"]||"—"}/><DI l="続柄" v={selMem[p+"Rel"]||"—"}/><DI l="電話" v={selMem[p+"Phone"]||"—"}/><DI l="メール" v={selMem[p+"Email"]||"—"}/></div></div>))}</div>
          <div style={S.mFoot}><button onClick={()=>editMem(selMem)} style={S.edBtn}>✏️ 編集</button><button onClick={()=>setDelCfm(selMem.id)} style={S.dlBtn}>🗑 削除</button></div>
        </div></div>)}

        {/* Delete Confirm */}
        {delCfm&&(<div style={S.ov} onClick={()=>setDelCfm(null)}><div style={{...S.modal,maxWidth:400}} onClick={e=>e.stopPropagation()}><h3 style={{margin:"16px 20px 12px"}}>本当に削除しますか？</h3><p style={{color:"#666",margin:"0 20px 20px",fontSize:14}}>取り消せません。</p><div style={{display:"flex",gap:8,justifyContent:"flex-end",padding:"0 20px 16px"}}><button onClick={()=>setDelCfm(null)} style={S.canBtn}>キャンセル</button><button onClick={()=>delMem(delCfm)} style={S.dlBtn}>削除する</button></div></div></div>)}

        {/* Member Form */}
        {showForm&&(<div style={S.ov} onClick={()=>{setShowForm(false);setEditId(null);}}><div style={{...S.modal,maxWidth:640}} onClick={e=>e.stopPropagation()}>
          <div style={S.mHead}><h2 style={{margin:0,fontSize:18}}>{editId?"部員情報を編集":"新しい部員を追加"}</h2><button onClick={()=>{setShowForm(false);setEditId(null);}} style={S.clsBtn}>✕</button></div>
          <div style={{...S.mBody,maxHeight:"65vh",overflowY:"auto"}}>
            <fieldset style={S.fs}><legend style={S.lg}>基本情報</legend>
              <div style={S.fRow}><FF l="姓" v={form.lastName} c={v=>uForm("lastName",v)} p="田中" r/><FF l="名" v={form.firstName} c={v=>uForm("firstName",v)} p="太郎" r/></div>
              <div style={S.fRow}><FF l="姓（かな）" v={form.lastNameKana} c={v=>uForm("lastNameKana",v)} p="たなか"/><FF l="名（かな）" v={form.firstNameKana} c={v=>uForm("firstNameKana",v)} p="たろう"/></div>
              <div style={S.fRow}>
                <div style={{flex:1,minWidth:140}}><label style={S.labelSt}>入会時の学年 *</label><select value={form.baseGrade} onChange={e=>uForm("baseGrade",e.target.value)} style={S.input}><option value="">選択...</option>{GRADES.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
                <div style={{flex:1,minWidth:140}}><label style={S.labelSt}>現在（自動）</label><div style={{...S.input,backgroundColor:"#f5f5f5",display:"flex",alignItems:"center",gap:8}}>{fpg?<><span style={{fontWeight:600}}>{fpg}</span>{fpc&&<CB c={fpc}/>}</>:"学年を選択"}</div></div>
                <FF l="背番号" v={form.number} c={v=>uForm("number",v)} p="10" t="number"/>
              </div>
              {fpc==="U-6"&&(<div style={S.fRow}><div style={{flex:1,minWidth:140}}><label style={S.labelSt}>週の回数（U-6）*</label><select value={form.u6Frequency||1} onChange={e=>uForm("u6Frequency",parseInt(e.target.value))} style={S.input}>{U6F.map(o=><option key={o.v} value={o.v}>{o.l}（¥{o.f.toLocaleString()}）</option>)}</select></div></div>)}
              <div style={S.fRow}><FF l="学校/幼稚園" v={form.school} c={v=>uForm("school",v)} p="さくら小学校"/><FF l="住所" v={form.address} c={v=>uForm("address",v)} p="東京都..."/></div>
              <div style={S.fRow}><FF l="入会日" v={form.joinDate} c={v=>uForm("joinDate",v)} t="date"/><FF l="退会日" v={form.leaveDate} c={v=>uForm("leaveDate",v)} t="date"/></div>
              <div style={S.fRow}><FF l="兄弟グループID" v={form.siblingGroup} c={v=>uForm("siblingGroup",v)} p="例: tanaka"/></div>
              <div style={{fontSize:11,color:"#888",marginTop:-6,marginBottom:8}}>※ 兄弟に同じIDを設定→自動で兄弟割引適用</div>
            </fieldset>
            {[["保護者①","parent1"],["保護者②","parent2"]].map(([t,px])=>(<fieldset key={px} style={S.fs}><legend style={S.lg}>{t}</legend>
              <div style={S.fRow}><FF l="氏名" v={form[px+"Name"]} c={v=>uForm(px+"Name",v)} p="田中 花子"/><div style={{flex:1,minWidth:140}}><label style={S.labelSt}>続柄</label><select value={form[px+"Rel"]} onChange={e=>uForm(px+"Rel",e.target.value)} style={S.input}><option value="">選択...</option>{RELS.map(r=><option key={r} value={r}>{r}</option>)}</select></div></div>
              <div style={S.fRow}><FF l="電話番号" v={form[px+"Phone"]} c={v=>uForm(px+"Phone",v)} p="090-1234-5678"/><FF l="メール" v={form[px+"Email"]} c={v=>uForm(px+"Email",v)} p="example@mail.com"/></div>
            </fieldset>))}
          </div>
          <div style={S.mFoot}><button onClick={()=>{setShowForm(false);setEditId(null);}} style={S.canBtn}>キャンセル</button><button onClick={submitMember} style={{...S.subBtn,opacity:(!form.lastName||!form.firstName||!form.baseGrade)?0.5:1}} disabled={!form.lastName||!form.firstName||!form.baseGrade}>{editId?"更新する":"追加する"}</button></div>
        </div></div>)}

        {/* Multi-date Duplicate Modal */}
        {dupEvtData&&(()=>{
          const dDays=getDaysInMonth(dupCalYear,dupCalMonth);
          const dFirst=getFirstDayOfWeek(dupCalYear,dupCalMonth);
          const dWeeks=[];let dc=1;
          for(let w=0;w<6;w++){const wk=[];for(let d=0;d<7;d++){if((w===0&&d<dFirst)||dc>dDays)wk.push(null);else{wk.push(dc);dc++;}}dWeeks.push(wk);if(dc>dDays)break;}
          const toggleDupDate=(day)=>{
            const ds=`${dupCalYear}-${String(dupCalMonth).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            setDupDates(prev=>prev.includes(ds)?prev.filter(x=>x!==ds):[...prev,ds]);
          };
          const isDupSelected=(day)=>{
            const ds=`${dupCalYear}-${String(dupCalMonth).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            return dupDates.includes(ds);
          };
          return(
          <div style={S.ov} onClick={()=>setDupEvtData(null)}><div style={{...S.modal,maxWidth:480}} onClick={e=>e.stopPropagation()}>
            <div style={S.mHead}><h3 style={{margin:0,fontSize:16}}>📋 予定を複製</h3><button onClick={()=>setDupEvtData(null)} style={S.clsBtn}>✕</button></div>
            <div style={S.mBody}>
              <div style={{background:"#f5f5f5",borderRadius:8,padding:10,marginBottom:12,fontSize:12}}>
                <div><strong>{EVT_TYPES.find(t=>t.key===dupEvtData.type)?.label}</strong> {dupEvtData.startTime&&`${dupEvtData.startTime}〜${dupEvtData.endTime||""}`}</div>
                <div style={{color:"#666"}}>{dupEvtData.classes.join(", ")}</div>
              </div>
              <p style={{fontSize:13,color:"#555",marginBottom:8}}>複製先の日付をカレンダーからタップしてください（複数選択可）</p>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <button onClick={()=>{if(dupCalMonth===1){setDupCalMonth(12);setDupCalYear(y=>y-1);}else setDupCalMonth(m=>m-1);}} style={S.yrBtn}>◀</button>
                <span style={{fontWeight:700,fontSize:15}}>{dupCalYear}年{dupCalMonth}月</span>
                <button onClick={()=>{if(dupCalMonth===12){setDupCalMonth(1);setDupCalYear(y=>y+1);}else setDupCalMonth(m=>m+1);}} style={S.yrBtn}>▶</button>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",marginBottom:8}}>
                <thead><tr>{["日","月","火","水","木","金","土"].map((d,i)=>(<th key={i} style={{textAlign:"center",padding:"4px",fontSize:11,color:i===0?"#C62828":i===6?"#0D47A1":"#888"}}>{d}</th>))}</tr></thead>
                <tbody>{dWeeks.map((wk,wi)=>(<tr key={wi}>{wk.map((day,di)=>{
                  const sel=day&&isDupSelected(day);
                  return(<td key={di} style={{textAlign:"center",padding:2}}>
                    {day&&(<button onClick={()=>toggleDupDate(day)} style={{width:36,height:36,borderRadius:"50%",border:sel?"2px solid #2E7D32":"1px solid #e0e0e0",background:sel?"#2E7D32":"white",color:sel?"white":(di===0?"#C62828":di===6?"#0D47A1":"#333"),fontWeight:sel?800:500,fontSize:13,cursor:"pointer"}}>{day}</button>)}
                  </td>);
                })}</tr>))}</tbody>
              </table>
              {dupDates.length>0&&(
                <div style={{background:"#E8F5E9",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#2E7D32"}}>
                  <strong>{dupDates.length}日選択中：</strong>{dupDates.sort().map(d=>{const dt=new Date(d);return `${dt.getMonth()+1}/${dt.getDate()}`;}).join(", ")}
                </div>
              )}
            </div>
            <div style={S.mFoot}>
              <button onClick={()=>setDupEvtData(null)} style={S.canBtn}>キャンセル</button>
              <button onClick={()=>{
                if(dupDates.length===0){alert("日付を選択してください");return;}
                let maxId=events.length>0?Math.max(...events.map(e=>e.id)):0;
                const newEvts=dupDates.sort().map(d=>{maxId++;return{...dupEvtData,id:maxId,date:d};});
                setEvents(p=>[...p,...newEvts]);
                setDupEvtData(null);setDupDates([]);
                alert(dupDates.length+"件の予定を複製しました！");
              }} style={{...S.subBtn,opacity:dupDates.length>0?1:0.5}} disabled={dupDates.length===0}>{dupDates.length}件を複製</button>
            </div>
          </div></div>);
        })()}

        {/* Backup - inline (not modal) */}
        {backupData&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"white",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{maxWidth:500,width:"100%"}}>
              <h2 style={{fontSize:18,marginBottom:12}}>📥 バックアップデータ</h2>
              <p style={{fontSize:13,color:"#555",marginBottom:8}}>① 下のテキストを全選択（Ctrl+A） → ② コピー（Ctrl+C） → ③ メモ帳やGoogleドキュメントに貼り付けて保存</p>
              <textarea
                id="backup-textarea"
                defaultValue={backupData}
                readOnly
                onFocus={e=>e.target.select()}
                style={{width:"100%",height:250,padding:12,borderRadius:8,border:"2px solid #2E7D32",fontSize:12,fontFamily:"monospace",boxSizing:"border-box",marginBottom:16}}
              />
              <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
                <button
                  onClick={()=>{const ta=document.getElementById("backup-textarea");if(ta){ta.focus();ta.select();}}}
                  onMouseDown={e=>{e.currentTarget.style.transform="scale(0.95)";}}
                  onMouseUp={e=>{e.currentTarget.style.transform="scale(1)";}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";}}
                  style={{...S.subBtn,padding:"12px 24px",fontSize:15,transition:"all 0.1s"}}>📋 全選択</button>
                <button
                  onClick={()=>setBackupData(null)}
                  onMouseDown={e=>{e.currentTarget.style.transform="scale(0.95)";e.currentTarget.style.opacity="0.7";}}
                  onMouseUp={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.opacity="1";}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.opacity="1";}}
                  style={{...S.canBtn,padding:"12px 24px",fontSize:15,transition:"all 0.1s"}}>閉じる</button>
              </div>
            </div>
          </div>
        )}

        {/* Restore - inline (not modal) */}
        {showRestore&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"white",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{maxWidth:500,width:"100%"}}>
              <h2 style={{fontSize:18,marginBottom:12}}>📤 データ復元</h2>
              <p style={{fontSize:13,color:"#555",marginBottom:12}}>バックアップしたテキストを保存した .txt ファイルを選択してください。</p>
              <p style={{fontSize:12,color:"#888",marginBottom:16}}>※ バックアップテキストをメモ帳に貼り付けて .txt で保存したファイルを選んでください</p>
              <input
                type="file"
                accept=".txt,.json"
                style={{marginBottom:16,fontSize:14}}
                onChange={async (e)=>{
                  const file = e.target.files?.[0];
                  if (!file) return;
                  try {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    if(data.members){setMembers(data.members);sSet(SK.m,data.members);}
                    if(data.payments){setPayments(data.payments);sSet(SK.p,data.payments);}
                    if(data.extras){setExtras(data.extras);sSet(SK.e,data.extras);}
                    if(data.events){setEvents(data.events);sSet(SK.ev,data.events);}
                    if(data.coaches){setCoaches(data.coaches);sSet(SK.co,data.coaches);}
                    if(data.venues){setVenues(data.venues);sSet(SK.vn,data.venues);}
                    setShowRestore(false);
                    alert("データを復元しました！（部員: " + (data.members?.length||0) + "名、イベント: " + (data.events?.length||0) + "件）");
                  } catch(err) {
                    alert("ファイルの読み込みに失敗しました。正しいバックアップファイルか確認してください。");
                  }
                }}
              />
              <div style={{display:"flex",gap:12,justifyContent:"flex-end",marginTop:16}}>
                <button
                  onClick={()=>setShowRestore(false)}
                  onMouseDown={e=>{e.currentTarget.style.transform="scale(0.95)";e.currentTarget.style.opacity="0.7";}}
                  onMouseUp={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.opacity="1";}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.opacity="1";}}
                  style={{...S.canBtn,padding:"12px 24px",fontSize:15,transition:"all 0.1s"}}>閉じる</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}



ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    const swCode = `
const CACHE_NAME = 'soccer-club-v1';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.open(CACHE_NAME).then(cache =>
      cache.match(e.request).then(cached => {
        const fetchReq = fetch(e.request).then(res => {
          if (res && res.status === 200 && res.type !== 'opaque') {
            cache.put(e.request, res.clone());
          }
          return res;
        }).catch(() => cached);
        return cached || fetchReq;
      })
    )
  );
});
`;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(() => {
      console.log('SW registered');
    }).catch(err => console.log('SW error', err));
  });
}
</script>
</body>
</html>
